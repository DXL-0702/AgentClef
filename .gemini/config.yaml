have_fun: false

code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: -1
  pull_request_opened:
    help: true
    summary: true
    code_review: true
    include_drafts: false

ignore_patterns:
  - ".venv/**"
  - "venv/**"
  - "node_modules/**"
  - "dist/**"
  - "build/**"
  - "coverage/**"
  - "htmlcov/**"
  - ".pytest_cache/**"
  - ".mypy_cache/**"
  - ".ruff_cache/**"
  - "__pycache__/**"
  - "*.pyc"
  - ".env"
  - ".env.*"
  - "uploads/**"
  - "storage/**"
  - "tmp/**"
